<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTC PDF Generator</title>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>

    *{
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f3f4f6;
      padding:20px;
    }

    .container{
      max-width:750px;
      margin:auto;
      background:#fff;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
    }

    .form-group{
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
    }

    input,
    textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:15px;
    }

    textarea{
      resize:vertical;
      min-height:110px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      background:#1d4ed8;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#1e40af;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>MTC PDF Generator</h2>

    <div class="form-group">
      <label>MTC Generation Date & Time</label>
      <input type="datetime-local" id="mtcDateTime">
    </div>

    <div class="form-group">
      <label>Invoice Date</label>
      <input type="date" id="invoiceDate">
    </div>

    <div class="form-group">
      <label>Invoice Number</label>
      <input type="text" id="invoiceNumber" placeholder="Enter Invoice Number">
    </div>

    <div class="form-group">
      <label>MTC Number</label>
      <input type="text" id="mtcNumber" placeholder="Enter MTC Number">
    </div>

    <div class="form-group">
      <label>Generated By</label>
      <input type="text" id="generatedBy" placeholder="Enter Name">
    </div>

    <div class="form-group">
      <label>Site Address</label>

      <textarea id="siteAddress" placeholder="Enter Site Address"></textarea>
    </div>

    <div class="form-group">
      <label>Upload QR PNG</label>
      <input type="file" id="qrImage" accept="image/png">
    </div>

    <button onclick="generatePDF()">
      Generate PDF
    </button>

  </div>

  <script>

    async function fileToBase64(file){

      return new Promise((resolve, reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = ()=> resolve(reader.result);

        reader.onerror = error => reject(error);

      });

    }

    async function generatePDF(){

      const { jsPDF } = window.jspdf;

      const doc = new jsPDF({
        orientation:"portrait",
        unit:"mm",
        format:"a4"
      });

      // ===== INPUTS =====

      const mtcDateTime =
        document.getElementById("mtcDateTime").value;

      const invoiceDate =
        document.getElementById("invoiceDate").value;

      const invoiceNumber =
        document.getElementById("invoiceNumber").value;

      const mtcNumber =
        document.getElementById("mtcNumber").value;

      const generatedBy =
        document.getElementById("generatedBy").value;

      const siteAddress =
        document.getElementById("siteAddress").value;

      const qrFile =
        document.getElementById("qrImage").files[0];

      let qrBase64 = "";

      if(qrFile){

        qrBase64 = await fileToBase64(qrFile);

      }

      // ===== DATE FORMAT =====

      const formattedDateTime =
        new Date(mtcDateTime).toLocaleString("en-IN",{
          day:"numeric",
          month:"numeric",
          year:"2-digit",
          hour:"numeric",
          minute:"2-digit",
          hour12:true
        });

      const formattedInvoiceDate =
        new Date(invoiceDate).toLocaleDateString("en-GB",{
          day:"2-digit",
          month:"short",
          year:"numeric"
        });

      // ===== HEADER =====

      function drawHeader(pageNo,totalPages){

        // Date Time
        doc.setFontSize(8);

        doc.text(
          formattedDateTime,
          10,
          10
        );

        // Title
        doc.setFontSize(7);

        doc.text(
          "Manufacturing Test Certificate",
          105,
          10,
          {align:"center"}
        );

        // SAINT GOBAIN TEXT
        doc.setFontSize(18);

        doc.setTextColor(0,102,204);

        doc.setFont(undefined,"bold");

        doc.text(
          "SAINT-GOBAIN",
          105,
          32,
          {align:"center"}
        );

        doc.setTextColor(0);

        // Invoice Date
        doc.setFontSize(10);

        doc.setFont(undefined,"normal");

        doc.text(
          formattedInvoiceDate,
          15,
          48
        );

        // SRNO
        doc.setFont(undefined,"bold");

        doc.text(
          `SRNO - ${mtcNumber}`,
          165,
          48
        );

        // Page Count
        doc.setFont(undefined,"normal");

        doc.text(
          `Page - ${pageNo} out of ${totalPages}`,
          170,
          56
        );

        // Main Title
        doc.setFontSize(14);

        doc.setFont(undefined,"bold");

        doc.text(
          "MATERIAL TEST CERTIFICATE",
          105,
          64,
          {align:"center"}
        );

        // Body
        doc.setFontSize(9);

        doc.setFont(undefined,"normal");

        const bodyText =
          `This is to certify that METAL as supplied to M/s. SAMEER ENTERPRISE PD against our invoice number : ${invoiceNumber} , dated : ${formattedInvoiceDate} are tested and confirm to the below specification under IS 513,IS 16162, IS 15961,BS EN 14195,AS 1397 .`;

        const splitText =
          doc.splitTextToSize(bodyText,170);

        doc.text(splitText,15,76);

        // Blue Box
        doc.setDrawColor(102,178,255);

        doc.rect(
          10,
          88,
          190,
          52
        );

      }

      // ===== FOOTER =====

      function drawFooter(){
        y=145
        // SITE ADDRESS
        doc.setFontSize(10);

        doc.setFont(undefined,"bold");

        doc.text(
          "SITE ADDRESS :",
          20,
          145
        );

        doc.setFont(undefined,"normal");

        const addressLines =
          doc.splitTextToSize(siteAddress,95);

        doc.text(
          addressLines,
          20,
          151
        );

        // QR TITLE
        doc.setFontSize(7);

        doc.setFont(undefined,"bold");

        doc.text(
          "Please scan QR to authenticate MTC",
          148,
          145
        );

        // QR IMAGE
        if(qrBase64){

          doc.addImage(
            qrBase64,
            "PNG",
            154,
            149,
            34,
            34
          );

        }

        // Notes
        doc.setFontSize(8);

        doc.setFont(undefined,"normal");

        doc.text(
          "Note : This is Computer generated material test certificate and hence requires no signature.",
          15,
          190
        );

        doc.text(
          "Note : This is Just a Material Test Report for an individual product and cannot be produced as System Performance Test",
          15,
          195
        );

        doc.text(
          "Report (for Fire/Acoustic).",
          15,
          199
        );

        // Generated By
        doc.setFontSize(7);

        doc.text(
          `- Generated by LOG9N on ${formattedDateTime} as requested by LATIF CHAUDHARY`,
          25,
          206
        );

        // Gyproc Text
        doc.setFontSize(20);

        doc.setTextColor(0,102,204);

        doc.setFont(undefined,"bold");

        doc.text(
          "gyproc",
          105,
          217,
          {align:"center"}
        );

        doc.setTextColor(0);

        doc.setFontSize(6);

        doc.text(
          "SAINT-GOBAIN",
          105,
          221,
          {align:"center"}
        );

        // Footer Company
        doc.setFontSize(9);

        doc.setFont(undefined,"bold");

        doc.text(
          "Saint-Gobain India Private Limited – Gyproc Business",
          10,
          233
        );

        doc.setFont(undefined,"normal");

        doc.setFontSize(5.5);

        const footerText =
          "Corporate Off : 5th Level, Leela Business Park, Andheri Kurla Road, Andheri (E), Mumbai - 400 059, Board +91-022-40212121, Fax +91-022-40212390, Regd. Office : Sigapi Aachi Building, 7th Floor, 18/3, Rukmini Lakshmipathy Road, Egmore, Chennai - 600 008, Tamil Nadu, Tel +91-044-45936000.";

        const footerLines =
          doc.splitTextToSize(footerText,190);

        doc.text(
          footerLines,
          10,
          238
        );

      }

      // ===== PAGE =====

      drawHeader(1,1);

      drawFooter();

      // ===== SAVE =====

      doc.save(`MTC_${mtcNumber}.pdf`);

    }

  </script>

</body>
</html>
